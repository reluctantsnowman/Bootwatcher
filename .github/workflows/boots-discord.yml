name: Boots Watcher → Discord (Twice Daily)

on:
  schedule:
    - cron: "0 14 * * *"
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Run boots watcher (posts to Discord)
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SAVE_STATE: 1
        run: python Boots_top5.py

      - name: Commit updated state + log (safe mode)
        run: |
          git config --global user.name "boots-watcher-bot"
          git config --global user.email "boots-watcher-bot@users.noreply.github.com"

          # Make sure files exist before adding
          mkdir -p logs
          touch state_last_top5.json
          touch logs/boots_watcher.log

          git add state_last_top5.json logs/boots_watcher.log

          # Only commit if there are staged changes
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update boots watcher state/log"
            git push origin main
          fi
