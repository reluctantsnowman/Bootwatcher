name: Boots Watcher → Discord (Twice Daily)

on:
  schedule:
    - cron: "0 14 * * *"
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml

      - name: Run boots watcher (posts to Discord)
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SAVE_STATE: 1
        run: python Boots_top5.py

      - name: Commit updated state + log (if changed)
        run: |
          git config user.name "boots-watcher-bot"
          git config user.email "boots-watcher-bot@users.noreply.github.com"

          if git status --porcelain | grep -E -q "state_last_top5.json|logs/boots_watcher.log"; then
            git add state_last_top5.json logs/boots_watcher.log
            git commit -m "Update boots watcher state/log"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes to commit."
          fi
