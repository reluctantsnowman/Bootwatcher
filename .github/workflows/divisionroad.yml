name: Division Road Top 5 Boots (Twice Daily)

on:
  schedule:
    - cron: "0 14 * * *"  # 9:00 AM New York (EST)
    - cron: "0 2 * * *"   # 9:00 PM New York (EST)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run watcher + Discord notify
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python divisionroad_top5.py

      - name: Commit updated state (if changed)
        run: |
          git config user.name "divisionroad-bot"
          git config user.email "divisionroad-bot@users.noreply.github.com"
          git add state_last_top5.json
          git diff --staged --quiet || git commit -m "Update Division Road top5 state"
          git push
